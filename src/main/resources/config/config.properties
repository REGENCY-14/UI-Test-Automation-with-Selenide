# =============================================================================
# Application Under Test Configuration
# =============================================================================
# This file provides default runtime values for the UI automation framework.
# All values can be overridden at runtime using:
#   - JVM system property:      mvn test -Dbase.url=https://...
#   - Environment variable:     BASE_URL=https://... (Docker / CI)
# =============================================================================

# Base URL of the application under test.
# Used as Selenide's Configuration.baseUrl — all page open() calls are
# relative to this value.
base.url=https://www.saucedemo.com

# Browser to use for test execution.
# Supported values: chrome, firefox, edge
# Selenide handles WebDriver binary management automatically.
browser=chrome

# Run the browser in headless mode (no visible UI window).
# Set to true for CI/Docker environments to reduce resource usage.
# Set to false for local debugging to observe test execution visually.
headless=true

# Global element wait timeout in milliseconds.
# Selenide will poll the DOM for up to this duration before throwing
# ElementNotFound. Increase this value for slow network environments.
timeout.ms=10000
