# =============================================================================
# Allure Report Configuration
# =============================================================================
# This file is read automatically by the Allure agent at runtime.
# It must be present on the test classpath (src/test/resources/).
# =============================================================================

# Directory where Allure writes raw JSON result files after each test.
# The allure:report Maven goal reads from this directory to generate the HTML report.
# The CI pipeline uploads this directory as an artifact for later report generation.
allure.results.directory=target/allure-results

# Pattern for generating issue tracker links from @Issue annotations.
# Replace with your actual issue tracker URL.
# Usage in tests: @Issue("PROJ-123") → links to https://github.com/.../issues/PROJ-123
allure.link.issue.pattern=https://github.com/saucedemo/issues/{}

# Pattern for generating test management system links from @TmsLink annotations.
# Replace with your actual TMS URL.
# Usage in tests: @TmsLink("TC-001") → links to https://tms.example.com/tests/TC-001
allure.link.tms.pattern=https://tms.example.com/tests/{}
