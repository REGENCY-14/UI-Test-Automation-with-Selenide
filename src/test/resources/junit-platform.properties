# =============================================================================
# JUnit 5 Platform Configuration
# =============================================================================
# This file is read automatically by the JUnit Platform launcher at startup.
# It must be present on the test classpath (src/test/resources/).
# =============================================================================

# ── Parallel execution ────────────────────────────────────────────────────────

# Enable parallel test execution globally.
# When true, JUnit will run tests concurrently based on the mode settings below.
junit.jupiter.execution.parallel.enabled=true

# Execution mode for test METHODS within a single class.
# same_thread: methods run sequentially on the same thread (avoids WebDriver
# state conflicts within a class — each test method shares the same browser
# session lifecycle managed by @BeforeEach / @AfterEach).
junit.jupiter.execution.parallel.mode.default=same_thread

# Execution mode for test CLASSES.
# concurrent: different test classes run in parallel on separate threads,
# each with their own independent browser session.
junit.jupiter.execution.parallel.mode.classes.default=concurrent

# Thread pool sizing strategy.
# dynamic: JUnit calculates the pool size as:
#   availableProcessors * dynamic.factor
# Increase dynamic.factor for more parallelism on machines with many cores.
junit.jupiter.execution.parallel.config.strategy=dynamic
junit.jupiter.execution.parallel.config.dynamic.factor=1

# ── Retry ─────────────────────────────────────────────────────────────────────
# Retry behaviour is handled programmatically via RetryExtension.
# Configure the retry count at runtime: mvn test -Dtest.retry.count=2
