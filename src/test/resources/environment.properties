# =============================================================================
# Allure Environment Properties
# =============================================================================
# This file is copied into target/allure-results before each test run by
# BaseTest.setUp(). Allure reads it when generating the report and displays
# these key-value pairs on the Overview tab under the "Environment" panel.
#
# Update these values to reflect the actual versions used in your environment.
# =============================================================================

# Application under test
Application=SauceDemo
Application.URL=https://www.saucedemo.com

# Browser configuration
Browser=chrome
Browser.Headless=true

# Runtime versions
Java.Version=17
Framework=Selenide 7.2.2
Test.Framework=JUnit 5.10.2
Allure.Version=2.27.0

# Execution environment (local / CI / Docker)
Environment=CI
