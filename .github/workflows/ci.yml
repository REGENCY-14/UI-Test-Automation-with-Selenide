name: UI Automation Tests

on:
  push:
    branches: [ "main", "develop", "feature/**" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx2048m'

jobs:
  test:
    name: Run Selenide Tests
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ────────────────────────────────────────────────────────────────
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      # ── Maven cache ─────────────────────────────────────────────────────────
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── Chrome ──────────────────────────────────────────────────────────────
      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # ── Run tests ───────────────────────────────────────────────────────────
      - name: Run tests
        run: |
          mvn test \
            -Dbrowser=chrome \
            -Dheadless=true \
            -Dbase.url=https://www.saucedemo.com \
            --no-transfer-progress
        continue-on-error: true

      # ── Allure report ───────────────────────────────────────────────────────
      - name: Generate Allure report
        if: always()
        run: mvn allure:report --no-transfer-progress

      # ── Upload Allure results (raw JSON) ────────────────────────────────────
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: target/allure-results
          retention-days: 30

      # ── Upload Allure HTML report ────────────────────────────────────────────
      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: target/site/allure-maven-plugin
          retention-days: 30

      # ── Upload Surefire XML reports ──────────────────────────────────────────
      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ github.run_number }}
          path: target/surefire-reports
          retention-days: 14

      # ── Publish Allure report to GitHub Pages ────────────────────────────────
      - name: Deploy Allure report to GitHub Pages
        if: github.ref == 'refs/heads/main' && always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site/allure-maven-plugin
          destination_dir: allure-report

      # ── Job summary ──────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Browser | Chrome (headless) |" >> $GITHUB_STEP_SUMMARY
          echo "| Java | ${{ env.JAVA_VERSION }} |" >> $GITHUB_STEP_SUMMARY
